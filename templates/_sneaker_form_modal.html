<div class="modal fade" id="sneakerFormModal" tabindex="-1" aria-labelledby="sneakerFormModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="sneakerFormModalLabel">Add Sneaker</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="border rounded p-3 mb-4 bg-light">
                    <label for="sneaker-search-input" class="form-label fw-bold">1. Sneaker Lookup (Optional)</label>
                    <div class="input-group">
                        <input type="text" id="sneaker-search-input" class="form-control" placeholder="e.g., Jordan 1 Lost and Found">
                        <button class="btn btn-outline-primary" type="button" id="sneaker-search-btn">Search</button>
                    </div>
                    <div class="form-text mb-2">Search our database to auto-fill details below.</div>
                    <div id="sneaker-search-results" style="max-height: 200px; overflow-y: auto;"></div>
                </div>
                <hr>
                <h5 class="mb-3">2. Your Sneaker Details</h5>
                <div id="newImagePreviewArea" class="mt-3 text-center" style="display: none;">
                    <p class="mb-1"><small>New image preview:</small></p>
                    <img src="#" id="newSneakerImagePreview" class="img-thumbnail" style="max-width: 200px; max-height: 200px;">
                </div>
                <form id="sneakerModalForm" method="POST" enctype="multipart/form-data">
                    <div id="sneakerModalFormContent">
                       {% with form = form_for_modal %}{% include '_sneaker_form_fields.html' %}{% endwith %}
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="submit" class="btn btn-primary" id="saveSneakerModalButton" form="sneakerModalForm">Save Sneaker</button>
            </div>
        </div>
    </div>
</div>
