<div class="modal fade" id="sneakerSaleModal" tabindex="-1" aria-labelledby="sneakerSaleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="sneakerSaleModalLabel">Remove Sneaker</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="mb-3">Did you sell this sneaker?</p>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="soldSneakerToggle">
                    <label class="form-check-label" for="soldSneakerToggle">Yes, I sold it</label>
                </div>
                <div id="soldDetailsFields" class="border rounded p-3 bg-light" style="display: none;">
                    <div class="mb-2">
                        <label for="soldPriceInput" class="form-label">Sale Price</label>
                        <div class="input-group">
                            <input type="number" step="0.01" min="0" class="form-control" id="soldPriceInput" placeholder="0.00">
                            <select id="soldCurrencySelect" class="form-select">
                                <option value="GBP">GBP</option>
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                            </select>
                        </div>
                        <div class="form-text">We use this for your sold stats and per-size sale data.</div>
                    </div>
                    <div>
                        <label for="soldDateInput" class="form-label">Sale Date</label>
                        <input type="date" class="form-control" id="soldDateInput">
                    </div>
                </div>
                <div class="text-danger small mt-2" id="soldErrorMessage" style="display: none;"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmSneakerDelete">Remove</button>
            </div>
        </div>
    </div>
</div>
